<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portfolio Analyzer{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ee;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #1f6feb;
      --accent-strong: #1558b0;
      --border: #d9dee7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f6f1 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(31, 41, 51, 0.06);
    }

    a {
      color: inherit;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="page-shell">
    {% block content %}{% endblock %}
  </div>
</body>
</html>

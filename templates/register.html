<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Register</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: Arial, sans-serif;
			background: #f5f7fb;
			color: #1f2937;
		}

		.card {
			width: min(100%, 420px);
			background: #fff;
			border: 1px solid #d9dee7;
			border-radius: 16px;
			padding: 28px;
			box-shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
		}

		h1 {
			margin: 0 0 18px;
			font-size: 1.8rem;
		}

		.messages {
			margin: 0 0 16px;
			padding-left: 18px;
			color: #b42318;
		}

		.field {
			margin-bottom: 14px;
		}

		label {
			display: block;
			margin-bottom: 6px;
			font-size: 0.95rem;
		}

		input {
			width: 100%;
			padding: 11px 12px;
			border: 1px solid #cfd6e4;
			border-radius: 10px;
			font-size: 1rem;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			padding: 11px 12px;
			border: 0;
			border-radius: 10px;
			background: #1f6feb;
			color: #fff;
			font-size: 1rem;
			cursor: pointer;
		}

		.footer {
			margin-top: 16px;
			text-align: center;
			font-size: 0.95rem;
		}

		.footer a {
			color: #1f6feb;
			text-decoration: none;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Register</h1>
		{% with messages = get_flashed_messages() %}
			{% if messages %}
				<ul class="messages">
					{% for message in messages %}
						<li>{{ message }}</li>
					{% endfor %}
				</ul>
			{% endif %}
		{% endwith %}

		<form method="post" action="/register">
			<div class="field">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" required>
			</div>
			<div class="field">
				<label for="password">Password</label>
				<input id="password" name="password" type="password" required>
			</div>
			<div class="field">
				<label for="confirm_password">Confirm Password</label>
				<input id="confirm_password" name="confirm_password" type="password" required>
			</div>
			<button type="submit">Register</button>
		</form>

		<div class="footer">
			<a href="/login">Already have an account? Login</a>
		</div>
	</main>
</body>
</html>
